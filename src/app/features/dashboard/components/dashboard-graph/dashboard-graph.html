<div class="charts-wrapper">
  <mat-card class="chart-card">
    <mat-card-header>
      <mat-card-title>Weekly Overview</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="canvas-container">
        <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="barChartType">
        </canvas>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="chart-card">
    <mat-card-header>
      <mat-card-title>Project Status</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="canvas-container">
        <canvas baseChart [data]="pieChartData" [options]="pieChartOptions" [type]="pieChartType">
        </canvas>
      </div>
    </mat-card-content>
  </mat-card>
</div>
